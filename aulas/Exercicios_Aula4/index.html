<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício JS</title>
</head>

<body>

    <script>

        let idade = Number(prompt("Digite sua idade:"));

        if (idade < 12) {
            alert("Você é Criança");
        } else if (idade < 18) {
            alert("Você é Adolescente");
        } else if (idade < 60) {
            alert("Você é Adulto");
        } else {
            alert("Você é Idoso");
        }


        let nota = Number(prompt("Digite a nota do aluno:"));

        if (nota >= 9) {
            alert("Excelente");
        } else if (nota >= 7) {
            alert("Bom");
        } else if (nota >= 5) {
            alert("Regular");
        } else {
            alert("Reprovado");
        }

    </script>

</body>

</html>
